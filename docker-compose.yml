services:
  # ─── Infrastructure ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: roomate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: roomate_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: roomate-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    container_name: roomate-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: roomate-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: roomate-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  # ─── Services ─────────────────────────────────────────────────────
  auth:
    build:
      context: ./apps/auth
      dockerfile: Dockerfile
    container_name: roomate-auth
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: roomate_access_secret_dev
      JWT_REFRESH_SECRET: roomate_refresh_secret_dev
      JWT_ACCESS_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 7d
      KAFKA_BROKER: kafka:9092
      EMAIL_SERVICE_URL: http://email:3002
    ports:
      - '3001:3001'

  email:
    build:
      context: ./apps/email
      dockerfile: Dockerfile
    container_name: roomate-email
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      PORT: 3002
      KAFKA_BROKER: kafka:9092
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    ports:
      - '3002:3002'

  listing:
    build:
      context: ./apps/listing
      dockerfile: Dockerfile
    container_name: roomate-listing
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/listing_db
      JWT_SECRET: roomate_access_secret_dev
      KAFKA_BROKER: kafka:9092
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: eu-north-1
      AWS_S3_BUCKET: roomate-uploads
      GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
    ports:
      - '3003:3003'

  community:
    build:
      context: ./apps/community
      dockerfile: Dockerfile
    container_name: roomate-community
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/community_db
      JWT_SECRET: roomate_access_secret_dev
      KAFKA_BROKER: kafka:9092
    ports:
      - '3004:3004'

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: roomate-admin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3005
      JWT_SECRET: roomate_access_secret_dev
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      AUTH_SERVICE_URL: http://auth:3001
      NOTIFICATION_SERVICE_URL: http://notification:3008
    ports:
      - '3005:3005'

  chat:
    build:
      context: ./apps/chat
      dockerfile: Dockerfile
    container_name: roomate-chat
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3006
      JWT_SECRET: roomate_access_secret_dev
      MONGODB_URI: mongodb://mongo:27017/chat_db
    ports:
      - '3006:3006'

  gateway:
    build:
      context: ./apps/gateway
      dockerfile: Dockerfile
    container_name: roomate-gateway
    restart: unless-stopped
    depends_on:
      - auth
      - listing
      - community
      - chat
      - notification
      - admin
    environment:
      PORT: 3007
      JWT_ACCESS_SECRET: roomate_access_secret_dev
      AUTH_SERVICE_URL: http://auth:3001
      NOTIFICATION_SERVICE_URL: http://notification:3008
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      ADMIN_SERVICE_URL: http://admin:3005
      CHAT_SERVICE_URL: http://chat:3006
    ports:
      - '3007:3007'

  notification:
    build:
      context: ./apps/notification
      dockerfile: Dockerfile
    container_name: roomate-notification
    restart: unless-stopped
    depends_on:
      - mongo
      - kafka
    environment:
      PORT: 3008
      MONGODB_URI: mongodb://mongo:27017/notification_db
      KAFKA_BROKER: kafka:9092
      JWT_ACCESS_SECRET: roomate_access_secret_dev
    ports:
      - '3008:3008'

  # ─── Nginx ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: roomate-nginx
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  mongo_data:
