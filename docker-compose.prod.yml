version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "3007:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
      - chat
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: 3007
      AUTH_SERVICE_URL: http://auth:3001
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      ADMIN_SERVICE_URL: http://admin:3005
      CHAT_SERVICE_URL: http://chat:3006
      NOTIFICATION_SERVICE_URL: http://notification:3008
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    depends_on:
      - auth
      - listing
      - community
      - chat
      - notification
      - admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      EMAIL_SERVICE_URL: http://email:3002
      WEB_URL: ${WEB_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  listing:
    build:
      context: .
      dockerfile: apps/listing/Dockerfile
    environment:
      PORT: 3003
      DATABASE_URL: ${LISTING_DATABASE_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      JWT_SECRET: ${JWT_ACCESS_SECRET}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  community:
    build:
      context: .
      dockerfile: apps/community/Dockerfile
    environment:
      PORT: 3004
      DATABASE_URL: ${COMMUNITY_DATABASE_URL}
      JWT_SECRET: ${JWT_ACCESS_SECRET}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
    environment:
      PORT: 3006
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_ACCESS_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    environment:
      PORT: 3008
      MONGODB_URI: ${NOTIFICATION_MONGODB_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  email:
    build:
      context: .
      dockerfile: apps/email/Dockerfile
    environment:
      PORT: 3002
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKAJS_NO_PARTITIONER_WARNING: 1
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      WEB_URL: ${WEB_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      PORT: 3005
      AUTH_SERVICE_URL: http://auth:3001
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      NOTIFICATION_SERVICE_URL: http://notification:3008
      JWT_SECRET: ${JWT_ACCESS_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    driver: bridge
