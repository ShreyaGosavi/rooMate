version: '3.8'

services:
  # ─── Infrastructure ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: roomate_dev_password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      AUTH_SERVICE_URL: http://auth:3001
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      ADMIN_SERVICE_URL: http://admin:3005
      CHAT_SERVICE_URL: http://chat:3006
      NOTIFICATION_SERVICE_URL: http://notification:3008
      JWT_ACCESS_SECRET: roomate_access_secret_dev
    depends_on:
      - auth
      - listing
      - community
      - chat
      - notification
      - admin
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/auth_db
      JWT_ACCESS_SECRET: roomate_access_secret_dev
      JWT_REFRESH_SECRET: roomate_refresh_secret_dev
      JWT_ACCESS_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
      EMAIL_SERVICE_URL: http://email:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  listing:
    build:
      context: .
      dockerfile: apps/listing/Dockerfile
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/listing_db
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      JWT_SECRET: roomate_access_secret_dev
      KAFKA_BROKER: kafka:9092
      GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  community:
    build:
      context: .
      dockerfile: apps/community/Dockerfile
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://postgres:roomate_dev_password@postgres:5432/community_db
      JWT_SECRET: roomate_access_secret_dev
      KAFKA_BROKER: kafka:9092
      AUTH_SERVICE_URL: http://auth:3001
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  chat:
    build:
      context: .
      dockerfile: apps/chat/Dockerfile
    environment:
      PORT: 3006
      MONGODB_URI: mongodb://mongodb:27017/chat_db
      JWT_SECRET: roomate_access_secret_dev
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    environment:
      PORT: 3008
      MONGODB_URI: mongodb://mongodb:27017/notification_db
      KAFKA_BROKER: kafka:9092
      JWT_ACCESS_SECRET: roomate_access_secret_dev
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  email:
    build:
      context: .
      dockerfile: apps/email/Dockerfile
    environment:
      PORT: 3002
      KAFKA_BROKER: kafka:9092
      KAFKAJS_NO_PARTITIONER_WARNING: 1
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: gosavishreya08@gmail.com
      WEB_URL: http://localhost:3000
    depends_on:
      kafka:
        condition: service_started
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    environment:
      PORT: 3005
      JWT_SECRET: roomate_access_secret_dev
      LISTING_SERVICE_URL: http://listing:3003
      COMMUNITY_SERVICE_URL: http://community:3004
      AUTH_SERVICE_URL: http://auth:3001
      NOTIFICATION_SERVICE_URL: http://notification:3008
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  default:
    driver: bridge
